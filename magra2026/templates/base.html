{% load static %}
<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="48x48" href="{% static 'img/favicon.ico' %}">
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <!-- highlight.js -->
  <!-- <link rel="stylesheet"
  href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/10.0.3/styles/atom-one-dark-reasonable.min.css">
   -->

  <script src="https://unpkg.com/scrollreveal"></script>
  <title>{% block title %}{% endblock title %}</title>

  {% block description %} {% endblock description %}

  {% block tags %} {% endblock tags %}

  {% block css %} {% endblock css %}

</head>
<body>

<div class="container-fluid" >
  <br><br><br>
        {% block content %}

        {% endblock content %}
</div>
<style>
  .footer-custom {
      /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
      background:  #007bff;
      color: white;
      padding: 40px 0 20px;
      margin-top: 60px;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
  }

  .footer-section {
      margin-bottom: 30px;
  }

  .footer-section h5 {
      font-weight: 700;
      margin-bottom: 20px;
      position: relative;
      padding-bottom: 10px;
  }

  .footer-section h5::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 50px;
      height: 3px;
      background-color: white;
      border-radius: 2px;
  }

  .footer-links {
      list-style: none;
      padding: 0;
  }

  .footer-links li {
      margin-bottom: 10px;
  }

  .footer-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
  }

  .footer-links a:hover {
      color: white;
      transform: translateX(5px);
  }

  .social-icons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
  }

  .social-icon {
      width: 40px;
      height: 40px;
      background-color: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      transition: all 0.3s;
      font-size: 18px;
  }

  .social-icon:hover {
      background-color: white;
      color: #667eea;
      transform: translateY(-5px);
  }

  .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 20px;
      margin-top: 30px;
      text-align: center;
  }

  .footer-bottom p {
      margin: 5px 0;
      font-size: 0.95rem;
  }

  .footer-contact {
      display: flex;
      flex-direction: column;
      gap: 10px;
  }

  .footer-contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.9);
  }

  .footer-contact-item i {
      width: 20px;
      text-align: center;
  }

  .heart-icon {
      color: #ff6b6b;
      animation: heartbeat 1.5s infinite;
  }

  @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
  }

  @media (max-width: 768px) {
      .footer-custom {
          padding: 30px 0 15px;
      }

      .footer-section {
          margin-bottom: 25px;
          text-align: center;
      }

      .footer-section h5::after {
          left: 50%;
          transform: translateX(-50%);
      }

      .social-icons {
          justify-content: center;
      }

      .footer-contact {
          align-items: center;
      }
  }
</style>



  {% block js %}

  {% endblock js %}


  <script src="{% static 'js/jquery-3.4.1.slim.min.js' %}"></script>
  <script src="{% static 'js/popper.min.js' %}"></script>
  <script src="{% static 'js/bootstrap.min.js' %}"></script>

</body>
</html>
