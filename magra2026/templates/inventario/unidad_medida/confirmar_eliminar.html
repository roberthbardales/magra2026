{% extends "inventario/base_inventario.html" %}
{% block page_title %}Eliminar Unidad{% endblock %}
{% block inv_content %}
<div class="card border-0 shadow-sm" style="max-width:440px">
  <div class="card-body text-center">
    <i class="bi bi-trash text-danger" style="font-size:3rem"></i>
    <h5 class="mt-3">¿Eliminar "{{ object }}"?</h5>
    <p class="text-muted">Esta acción no se puede deshacer.</p>
    <form method="post">{% csrf_token %}
      <a href="{% url 'inventario_app:unidad-lista' %}" class="btn btn-outline-secondary mr-2">Cancelar</a>
      <button type="submit" class="btn btn-danger">Eliminar</button>
    </form>
  </div>
</div>
{% endblock %}
